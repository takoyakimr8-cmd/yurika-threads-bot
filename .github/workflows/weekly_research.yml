name: Weekly Research

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch: {}

jobs:
  run-research:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 必要なパッケージをインストール
        run: pip install -r scripts/requirements.txt

      - name: サービスアカウントキーを復元
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY_BASE64 }}" | base64 -d > scripts/serviceAccountKey.json

      - name: リサーチを実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/weekly_research.py
