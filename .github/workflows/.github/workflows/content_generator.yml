name: Content Generator

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch: {}

jobs:
  generate-content:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 必要なパッケージをインストール
        run: pip install -r scripts/requirements.txt

      - name: サービスアカウントキーを復元
        run: echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY_BASE64 }}" | base64 -d > scripts/serviceAccountKey.json

      - name: コンテンツを生成
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/content_generator.py
